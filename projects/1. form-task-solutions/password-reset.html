<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html, css practice</title>
    <link rel="stylesheet" href="real-world-form-tasks-solution.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>HTML elements Practice</h1>
      <nav class="main-nav" aria-label="Main navigation">
        <ul>
          <li class="nav-left"><a href="index.html">Home</a></li>
          <li><a href="#">Contact Us</a></li>
          <li><a href="index.html">Sign In</a></li>
          <li><a href="sign-up.html">Sign Up</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <section class="task-card" id="task-reset">
        <h2>Password Reset Page</h2>
        <p>Set a new password for your account.</p>

        <form class="form-layout" action="#" method="post">
          <label for="reset-email">Registered Email</label>
          <input
            id="reset-email"
            name="reset-email"
            type="email"
            placeholder="you@example.com"
            required
          />

          <label for="new-password">New Password</label>
          <input
            id="new-password"
            name="new-password"
            type="password"
            placeholder="Enter new password"
            required
          />

          <label for="confirm-new-password">Confirm New Password</label>
          <input
            id="confirm-new-password"
            name="confirm-new-password"
            type="password"
            placeholder="Re-enter new password"
            required
          />

          <button type="submit">Reset Password</button>
        </form>
      </section>
    </main>

    <footer class="page-footer">
      <p>Footer information</p>
    </footer>
  </body>
</html>
