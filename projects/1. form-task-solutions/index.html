<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html, css practice</title>
    <link rel="stylesheet" href="real-world-form-tasks-solution.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>HTML elements Practice</h1>
      <nav class="main-nav" aria-label="Main navigation">
        <ul>
          <li class="nav-left"><a href="index.html">Home</a></li>
          <li><a href="#">Contact Us</a></li>
          <li><a href="index.html">Sign In</a></li>
          <li><a href="sign-up.html">Sign Up</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <section class="task-card" id="task-1">
        <h2>Sign In Page</h2>
        <p>Login form for my account.</p>

        <form class="form-layout" action="#" method="post">
          <label for="signin-email">Email</label>
          <input
            id="signin-email"
            type="email"
            placeholder="student@example.com"
            required
            name="my email label"
          />

          <label for="signin-password">Password</label>
          <input
            id="signin-password"
            name="signin-password"
            type="password"
            placeholder="Enter your password"
            required
          />

          <div class="inline-row">
            <label class="inline-option" for="remember-me">
              <input id="remember-me" name="remember-me" type="checkbox" />
              Remember me
            </label>
            <a href="password-reset.html">Forgot password?</a>
          </div>

          <button type="submit">Sign In</button>
        </form>

        <p class="help-text">
          Use your registered email and password. If you forgot credentials, use
          the reset page.
        </p>
      </section>
    </main>

    <footer class="page-footer">
      <p>Footer information</p>
    </footer>
  </body>
</html>
